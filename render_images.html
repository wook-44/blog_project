<script>
const IMGBB_KEY = 'f1487d42e522939e8c7bb70feacde1f9';
const DATE_STR  = '2026-04-27';
const SCALE     = 2; // 2x = 1440px wide

const images = [
  { templateId: 't1', name: `img1_kospi_market_${DATE_STR}`,       w: 720, h: 380 },
  { templateId: 't2', name: `img2_psychology_diagram_${DATE_STR}`, w: 720, h: 420 },
  { templateId: 't3', name: `img3_checklist_${DATE_STR}`,          w: 720, h: 320 },
  { templateId: 't4', name: `img4_sector_cards_${DATE_STR}`,       w: 720, h: 300 },
];

const logEl    = document.getElementById('log');
const outputEl = document.getElementById('json-output');
const canvas   = document.getElementById('cv');
const ctx      = canvas.getContext('2d');

function log(msg, type = 'info') {
  const d = document.createElement('div');
  d.className = `card ${type}`;
  d.textContent = msg;
  logEl.appendChild(d);
}

function svgToBlob(svgEl, w, h) {
  // Clone and set explicit dimensions
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('width',  w * SCALE);
  clone.setAttribute('height', h * SCALE);
  const xml = new XMLSerializer().serializeToString(clone);
  return new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
}

function drawSvgToCanvas(blob, w, h) {
  return new Promise((resolve, reject) => {
    canvas.width  = w * SCALE;
    canvas.height = h * SCALE;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve();
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

function canvasToBase64() {
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (!blob) { reject(new Error('toBlob failed')); return; }
      const reader = new FileReader();
      reader.onload = () => {
        // Strip data URL prefix
        const b64 = reader.result.split(',')[1];
        resolve(b64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    }, 'image/jpeg', 0.92);
  });
}

async function uploadToImgbb(b64, name) {
  const form = new FormData();
  form.append('key',   IMGBB_KEY);
  form.append('image', b64);
  form.append('name',  name);

  const resp = await fetch('https://api.imgbb.com/1/upload', {
    method: 'POST',
    body:   form,
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const json = await resp.json();
  if (!json.success) throw new Error(JSON.stringify(json));
  const d = json.data;
  return {
    name:        name,
    url:         d.url,
    display_url: d.display_url || d.url,
    viewer_url:  d.url_viewer  || '',
    delete_url:  d.delete_url  || '',
  };
}

async function processAll() {
  const results = [];
  log('🚀 업로드 시작', 'info');

  for (const img of images) {
    try {
      log(`⏳ ${img.name} 처리 중…`, 'info');

      const tpl  = document.getElementById(img.templateId);
      const svgEl = tpl.content.querySelector('svg');
      const blob  = svgToBlob(svgEl, img.w, img.h);

      await drawSvgToCanvas(blob, img.w, img.h);
      log(`  ✏️ Canvas 렌더링 완료 (${img.w * SCALE}×${img.h * SCALE})`, 'info');

      const b64  = await canvasToBase64();
      log(`  📦 JPEG 변환 완료 (${Math.round(b64.length / 1024)} KB)`, 'info');

      const info = await uploadToImgbb(b64, img.name);
      results.push(info);
      log(`  ✅ 업로드 완료 → ${info.url}`, 'ok');

    } catch (err) {
      log(`  ❌ ${img.name} 실패: ${err.message}`, 'err');
      results.push({ name: img.name, error: err.message });
    }
  }

  const jsonStr = JSON.stringify(results, null, 2);
  outputEl.textContent = '===JSON_START===\n' + jsonStr + '\n===JSON_END===';
  log('🎉 완료!', 'ok');
}

// Auto-run on load
window.addEventListener('load', processAll);
</script>
