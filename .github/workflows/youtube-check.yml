name: YouTube Playlist Check

on:
  schedule:
    # 매일 17:00 KST = 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run playlist checker
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        # ✅ Fix 1: output/ 은 .gitignore → data/ 에 저장하도록 수정된 스크립트 사용
        # ✅ Fix 2: RSS playlist_id 방식 제거 (YouTube 미지원) → API 전용
        # ✅ Fix 3: --max-results 10 으로 누락 영상 일괄 감지
        run: python scripts/check_playlist.py --max-results 10

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore: update new_videos & seen_videos ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          else
            echo "No changes to commit — 신규 영상 없음"
          fi
