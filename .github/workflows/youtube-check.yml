name: YouTube Playlist Check

# 매일 오전 8시 KST (= 전날 UTC 23:00)에 실행
# workflow_dispatch 로 수동 실행도 가능
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: youtube-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run playlist check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/check_playlist.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore(data): playlist check $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes in data/."
          fi
