name: YouTube Playlist Check

on:
  schedule:
    # GitHub Free 계정 cron은 1~3시간 지연이 흔함.
    # Mac launchd가 17:30 KST에 실행되므로, 그 전에 영상 push가 완료되도록 일찍 잡는다.
    # 영상은 보통 KST 12~13시 사이 업로드 → 14:00 KST부터 가능.
    - cron: "0 5 * * *"   # KST 14:00 (UTC 05:00) — 1차 (영상 업로드 직후)
    - cron: "0 7 * * *"   # KST 16:00 (UTC 07:00) — 2차 백업 (launchd 30분 전)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run playlist checker
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        # ✅ Fix 1: output/ 은 .gitignore → data/ 에 저장하도록 수정된 스크립트 사용
        # ✅ Fix 2: RSS playlist_id 방식 제거 (YouTube 미지원) → API 전용
        # ✅ Fix 3: --max-results 10 으로 누락 영상 일괄 감지
        run: python scripts/check_playlist.py --max-results 10

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore: update new_videos & seen_videos ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          else
            echo "No changes to commit — 신규 영상 없음"
          fi
