name: 📝 주식 블로그 자동 포스팅 파이프라인

on:
  # 기존 youtube-check.yml 워크플로우 완료 후 자동 실행
  workflow_run:
    workflows: ["YouTube 플레이리스트 체크"]
    types:
      - completed

  # 수동 실행 (특정 플랫폼만 선택 가능)
  workflow_dispatch:
    inputs:
      platforms:
        description: '포스팅 플랫폼 (쉼표 구분, 기본: 전체)'
        required: false
        default: 'naver,tistory,wordpress,brunch,medium'
      video_info_path:
        description: '영상 정보 JSON 경로 (기본: output/latest_video.json)'
        required: false
        default: 'output/latest_video.json'

  # 매일 09:00 KST (00:00 UTC) — youtube-check.yml이 08:00에 실행되므로 1시간 후
  schedule:
    - cron: '0 0 * * *'

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  NAVER_ID: ${{ secrets.NAVER_ID }}
  NAVER_PW: ${{ secrets.NAVER_PW }}
  NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }}
  TISTORY_APP_ID: ${{ secrets.TISTORY_APP_ID }}
  TISTORY_SECRET_KEY: ${{ secrets.TISTORY_SECRET_KEY }}
  TISTORY_ACCESS_TOKEN: ${{ secrets.TISTORY_ACCESS_TOKEN }}
  TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
  WP_URL: ${{ secrets.WP_URL }}
  WP_USERNAME: ${{ secrets.WP_USERNAME }}
  WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
  BRUNCH_EMAIL: ${{ secrets.BRUNCH_EMAIL }}
  BRUNCH_PW: ${{ secrets.BRUNCH_PW }}
  MEDIUM_EMAIL: ${{ secrets.MEDIUM_EMAIL }}
  MEDIUM_PW: ${{ secrets.MEDIUM_PW }}
  MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}

jobs:
  check-new-video:
    name: 🎬 새 영상 확인
    runs-on: ubuntu-latest
    outputs:
      has_new_video: ${{ steps.check.outputs.has_new_video }}
      video_info_path: ${{ steps.check.outputs.video_info_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser google-generativeai requests

      - name: 새 영상 확인
        id: check
        run: |
          python scripts/check_playlist.py --output-json output/latest_video.json
          if [ -f output/latest_video.json ]; then
            IS_NEW=$(python -c "
          import json
          with open('output/latest_video.json') as f:
              data = json.load(f)
          print('true' if data.get('is_new', False) else 'false')
          ")
            echo "has_new_video=$IS_NEW" >> $GITHUB_OUTPUT
            echo "video_info_path=output/latest_video.json" >> $GITHUB_OUTPUT
          else
            echo "has_new_video=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload video info
        if: steps.check.outputs.has_new_video == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: video-info
          path: output/latest_video.json

  seo-analysis:
    name: 🔍 SEO 분석
    runs-on: ubuntu-latest
    needs: check-new-video
    if: needs.check-new-video.outputs.has_new_video == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-generativeai pytrends requests beautifulsoup4

      - name: Download video info
        uses: actions/download-artifact@v4
        with:
          name: video-info
          path: output/

      - name: SEO 분석 실행
        run: |
          mkdir -p output/seo logs
          python scripts/agents/01_seo_analyzer.py output/latest_video.json

      - name: Upload SEO data
        uses: actions/upload-artifact@v4
        with:
          name: seo-data
          path: output/seo/

  benchmark-analysis:
    name: 📊 벤치마크 분석
    runs-on: ubuntu-latest
    needs: check-new-video
    if: needs.check-new-video.outputs.has_new_video == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai requests beautifulsoup4

      # 캐시된 스타일 가이드 복원 (24시간 유효)
      - name: Cache style guides
        uses: actions/cache@v4
        with:
          path: output/style_guides/
          key: style-guides-${{ hashFiles('scripts/agents/02_benchmark_analyzer.py') }}
          restore-keys: style-guides-

      - name: 벤치마크 분석 실행
        run: |
          mkdir -p output/style_guides logs
          python scripts/agents/02_benchmark_analyzer.py

      - name: Upload style guides
        uses: actions/upload-artifact@v4
        with:
          name: style-guides
          path: output/style_guides/

  blog-writing:
    name: ✍️ 블로그 작성
    runs-on: ubuntu-latest
    needs: [seo-analysis, benchmark-analysis]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: video-info
          path: output/

      - uses: actions/download-artifact@v4
        with:
          name: seo-data
          path: output/seo/

      - uses: actions/download-artifact@v4
        with:
          name: style-guides
          path: output/style_guides/

      - name: 블로그 포스트 작성
        run: |
          mkdir -p output/posts logs
          python scripts/agents/03_blog_writer.py output/latest_video.json

      - name: Upload posts
        uses: actions/upload-artifact@v4
        with:
          name: blog-posts
          path: output/posts/

  quality-check:
    name: ✅ 품질 검증
    runs-on: ubuntu-latest
    needs: blog-writing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: blog-posts
          path: output/posts/

      - uses: actions/download-artifact@v4
        with:
          name: seo-data
          path: output/seo/

      - uses: actions/download-artifact@v4
        with:
          name: style-guides
          path: output/style_guides/

      - name: 품질 검증 실행
        run: |
          mkdir -p output/quality logs
          for platform in naver tistory wordpress brunch medium; do
            META=$(find output/posts/$platform -name "*_meta.json" 2>/dev/null | head -1)
            if [ -n "$META" ]; then
              python scripts/agents/08_quality_checker.py "$META" "$platform" || true
            fi
          done

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: output/quality/

  posting:
    name: 🚀 플랫폼 포스팅
    runs-on: ubuntu-latest
    needs: quality-check
    strategy:
      matrix:
        platform: [tistory, wordpress]  # API 포스팅은 병렬 실행
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: blog-posts
          path: output/posts/

      - uses: actions/download-artifact@v4
        with:
          name: quality-reports
          path: output/quality/

      - name: ${{ matrix.platform }} 포스팅
        run: |
          META=$(find output/posts/${{ matrix.platform }} -name "*_meta.json" 2>/dev/null | head -1)
          if [ -n "$META" ]; then
            VIDEO_ID=$(python -c "import json; d=json.load(open('$META')); print(d['video_id'])")
            QUALITY=$(cat output/quality/${{ matrix.platform }}_${VIDEO_ID}_report.json 2>/dev/null | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('passed', False))")
            if [ "$QUALITY" = "True" ]; then
              python scripts/agents/0$([[ "${{ matrix.platform }}" == "tistory" ]] && echo "5" || echo "6")_${{ matrix.platform }}_poster.py "$META"
            else
              echo "❌ ${{ matrix.platform }} 품질 미달 포스팅 스킵"
            fi
          fi

  posting-chrome:
    name: 🌐 Chrome 포스팅 (네이버/브런치/미디엄)
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome + Selenium
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update && sudo apt-get install -y google-chrome-stable
          pip install selenium webdriver-manager requests

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: blog-posts
          path: output/posts/

      - uses: actions/download-artifact@v4
        with:
          name: quality-reports
          path: output/quality/

      - name: 네이버 포스팅
        continue-on-error: true
        run: |
          META=$(find output/posts/naver -name "*_meta.json" 2>/dev/null | head -1)
          if [ -n "$META" ]; then
            python scripts/agents/04_naver_poster.py "$META" --headless
          fi

      - name: 브런치 포스팅
        continue-on-error: true
        run: |
          META=$(find output/posts/brunch -name "*_meta.json" 2>/dev/null | head -1)
          if [ -n "$META" ]; then
            python scripts/agents/07_brunch_medium_poster.py brunch "$META" --headless
          fi

      - name: 미디엄 포스팅
        continue-on-error: true
        run: |
          META=$(find output/posts/medium -name "*_meta.json" 2>/dev/null | head -1)
          if [ -n "$META" ]; then
            python scripts/agents/07_brunch_medium_poster.py medium "$META" --headless
          fi

  report:
    name: 📋 파이프라인 리포트
    runs-on: ubuntu-latest
    needs: [posting, posting-chrome]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: output/

      - name: 결과 요약
        run: |
          echo "## 🗞️ 블로그 자동화 파이프라인 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 플랫폼 | 품질 점수 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|------|" >> $GITHUB_STEP_SUMMARY
          for platform in naver tistory wordpress brunch medium; do
            REPORT=$(find output/quality-reports -name "${platform}_*_report.json" 2>/dev/null | head -1)
            if [ -n "$REPORT" ]; then
              python -c "
          import json
          d = json.load(open('$REPORT'))
          icon = '✅' if d.get('passed') else '❌'
          print(f'| $platform | {d.get(\"overall_score\", \"?\")} | {icon} {d.get(\"action\", \"?\")} |')
          " >> $GITHUB_STEP_SUMMARY || echo "| $platform | - | ⚠️ 리포트 없음 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $platform | - | ⏭️ 스킵 |" >> $GITHUB_STEP_SUMMARY
            fi
          done
