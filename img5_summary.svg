  <text x="160" y="187" text-anchor="middle" fill="#60A5FA" font-size="14" font-weight="800">📊 시장 방향</text>
  <text x="160" y="207" text-anchor="middle" fill="#475569" font-size="11">Market Trend</text>
  <line x1="280" y1="162" x2="280" y2="222" stroke="#1E293B" stroke-width="1"/>
  <text x="528" y="192" text-anchor="middle" fill="#E2E8F0" font-size="13" font-weight="700">실적 장세 지속, 코스피 7,000 목표 유효</text>

  <!-- Row 2: 주목 섹터 -->
  <rect x="32" y="226" width="736" height="60" fill="#141F2E" rx="0"/>
  <rect x="32" y="226" width="6" height="60" fill="#10B981" rx="3"/>
  <text x="160" y="251" text-anchor="middle" fill="#34D399" font-size="14" font-weight="800">🎯 주목 섹터</text>
  <text x="160" y="271" text-anchor="middle" fill="#475569" font-size="11">Focus Sectors</text>
  <line x1="280" y1="226" x2="280" y2="286" stroke="#1E293B" stroke-width="1"/>
  <text x="528" y="250" text-anchor="middle" fill="#E2E8F0" font-size="12" font-weight="700">내수주(현대백화점) · 조선주(AI 복합 테마)</text>
  <text x="528" y="270" text-anchor="middle" fill="#94A3B8" font-size="12" font-weight="700">전력기기주(효성중공업)</text>

  <!-- Row 3: 투자 심리 -->
  <rect x="32" y="290" width="736" height="60" fill="#0F1E35" rx="0"/>
  <rect x="32" y="290" width="6" height="60" fill="#EC4899" rx="3"/>
  <text x="160" y="315" text-anchor="middle" fill="#F472B6" font-size="14" font-weight="800">🧠 투자 심리</text>
  <text x="160" y="335" text-anchor="middle" fill="#475569" font-size="11">Psychology</text>
  <line x1="280" y1="290" x2="280" y2="350" stroke="#1E293B" stroke-width="1"/>
  <text x="528" y="314" text-anchor="middle" fill="#E2E8F0" font-size="12" font-weight="700">공포 = 반응, 결정 아님 / 가치 중심 장기 보유</text>
  <text x="528" y="334" text-anchor="middle" fill="#94A3B8" font-size="12" font-weight="700">FOMO 인정 + 체계적 심리 장치 구축</text>

  <!-- Row 4: 이번 주 변수 -->
  <rect x="32" y="354" width="736" height="60" fill="#141F2E" rx="0"/>
  <rect x="32" y="354" width="6" height="60" fill="#F59E0B" rx="3"/>
  <text x="160" y="379" text-anchor="middle" fill="#FBBF24" font-size="14" font-weight="800">⚡ 이번 주 변수</text>
  <text x="160" y="399" text-anchor="middle" fill="#475569" font-size="11">Key Variables</text>
  <line x1="280" y1="354" x2="280" y2="414" stroke="#1E293B" stroke-width="1"/>
  <text x="528" y="384" text-anchor="middle" fill="#E2E8F0" font-size="13" font-weight="700">미국 빅테크(MS·아마존) 실적 발표</text>

  <!-- Table bottom border -->
  <rect x="32" y="414" width="736" height="1" fill="#334155"/>

  <!-- Bottom tagline -->
  <text x="400" y="440" text-anchor="middle" fill="#475569" font-size="12" font-style="italic">"좋은 기업을 골라 감정 없이 보유하는 시스템을 만드는 것이 진짜 투자입니다"</text>

  <text x="768" y="443" text-anchor="end" fill="#334155" font-size="10">12시에 만나요 | 2026.04.27</text>
