<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic', 'Nanum Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="header_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg5)"/>
  <rect width="800" height="450" fill="url(#bg5)" rx="16"/>
  <rect x="0" y="0" width="800" height="4" fill="url(#header_grad)" rx="2"/>

  <!-- Title -->
  <text x="32" y="48" fill="#64748B" font-size="12" font-weight="600" letter-spacing="3">SUMMARY TABLE</text>
  <text x="32" y="82" fill="white" font-size="24" font-weight="800">정리 — 실적과 인내, 지금 시장의 두 키워드</text>
  <rect x="32" y="94" width="60" height="3" fill="url(#header_grad)" rx="2"/>

  <!-- Table header -->
  <rect x="32" y="116" width="736" height="40" fill="#1E3A5F" rx="8"/>
  <text x="160" y="142" text-anchor="middle" fill="#93C5FD" font-size="13" font-weight="800">구분</text>
  <line x1="280" y1="116" x2="280" y2="156" stroke="#334155" stroke-width="1"/>
  <text x="528" y="142" text-anchor="middle" fill="#93C5FD" font-size="13" font-weight="800">핵심 메시지</text>

  <!-- Row 1: 시장 방향 -->
  <rect x="32" y="162" width="736" height="60" fill="#0F1E35" rx="0"/>
