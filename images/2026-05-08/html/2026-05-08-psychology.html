<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic'), local('Nanum Gothic'), local('나눔고딕'); font-weight: 400; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'); font-weight: 800 900; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>

    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>

    <stop offset="100%" style="stop-color:#EC4899"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#FBBF24"/>
    <stop offset="100%" style="stop-color:#F472B6"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>

  
  <text x="48" y="250" fill="url(#hero)" font-size="52" font-weight="900" filter="url(#glow)">FOMO·빚투가 변동성에서 심리 파괴</text>
  
  <rect x="48.0" y="320" width="317.3333333333333" height="260" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>

  <text x="206.66666666666666" y="392" text-anchor="middle" font-size="44">😱</text>

  <foreignObject x="64.0" y="478" width="285.3333333333333" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:17px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">삼전 쉬면 갈아탔다가 직전 최고점 물림 반복</div>
  </foreignObject>
  <rect x="381.3333333333333" y="320" width="317.3333333333333" height="260" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="540.0" cy="378" r="40" fill="#A78BFA22"/>
  <text x="540.0" y="392" text-anchor="middle" font-size="44">🤯</text>
  <text x="540.0" y="458" text-anchor="middle" fill="#A78BFA" font-size="24" font-weight="800">시총 집중 착시</text>
  <foreignObject x="397.3333333333333" y="478" width="285.3333333333333" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:17px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">두 종목 쉬어도 그 밑에서 자동차·로봇·방산 순환</div>
  </foreignObject>
  <rect x="714.6666666666666" y="320" width="317.3333333333333" height="260" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="873.3333333333333" cy="378" r="40" fill="#A78BFA22"/>
  <text x="873.3333333333333" y="392" text-anchor="middle" font-size="44">😩</text>
  <text x="873.3333333333333" y="458" text-anchor="middle" fill="#A78BFA" font-size="24" font-weight="800">목표가 맹신</text>
  <foreignObject x="730.6666666666666" y="478" width="285.3333333333333" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:17px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">전문가는 항상 시장 따라간다, 예언 아님</div>
  </foreignObject>
  
  <rect x="48" y="600" width="984" height="140" fill="#EC48991A" rx="16" stroke="#EC489966" stroke-width="2"/>
  <text x="80" y="642" fill="#EC4899" font-size="17" font-weight="800" letter-spacing="3">✓ 교정 방법</text>
  <foreignObject x="80" y="655" width="920" height="78">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:26px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif">섹터 예측 + 포지션 분할 + 증거금 20% 이내</div>
  </foreignObject>

  <!-- 인용구 박스 -->
  <rect x="48" y="950" width="984" height="78" fill="#1E3A5F" rx="14" opacity="0.55"/>
  <text x="68" y="980" fill="#94A3B8" font-size="18">"</text>
  <text x="84" y="982" fill="#FFFFFF" font-size="21" font-weight="600">신용/마진은 시가총액 30% 미만 유지</text>
  <text x="68" y="1012" fill="#64748B" font-size="16">— 박시동 (경제평론가)</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1056" text-anchor="end" fill="#334155" font-size="14" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
