<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0D1117;
    font-family: 'Apple SD Gothic Neo', 'AppleGothic', 'Malgun Gothic',
                 'Noto Sans KR', 'NanumGothic', sans-serif;
    color: #E6EDF3;
    position: relative;
  }
  .accent-bar {
    position: absolute; left: 0; top: 0;
    width: 7px; height: 100%;
    background: #3FB950;
  }
  .container {
    padding: 36px 48px 28px 64px;
    height: 100%; display: flex; flex-direction: column;
  }
  .header { margin-bottom: 16px; }
  .section-title {
    font-size: 26px; font-weight: 700;
    color: #E6EDF3; line-height: 1.2;
  }
  .date { font-size: 13px; color: #8B949E; margin-top: 6px; }
  .divider {
    height: 1px; background: #21262D;
    margin: 14px 0;
  }
  .footer {
    margin-top: auto;
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 12px; border-top: 1px solid #21262D;
    font-size: 12px; color: #8B949E;
  }
  .footer-tag { color: #3FB950; font-weight: 600; }

      .body { flex: 1; margin-top: 4px; }
      .point { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
      .badge {
        width: 34px; height: 34px; border-radius: 50%;
        background: #3FB950; color: #0D1117;
        font-size: 15px; font-weight: 800;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .pt-card {
        flex: 1; background: #161B22; border-radius: 8px;
        padding: 10px 18px;
      }
      .pt-text { font-size: 14px; color: #E6EDF3; line-height: 1.4; }
    </style></head><body>
<div class="accent-bar"></div>
<div class="container">
  <div class="header">
    <div class="section-title">✅&nbsp; 오늘의 핵심 포인트</div>
    <div class="date">2026-05-08</div>
  </div>
  <div class="divider"></div>
  <div class="body">
      <div class="point">
        <div class="badge">1</div>
        <div class="pt-card"><span class="pt-text">코스피 7,400 조정 = 반도체 업황 훼손 아님 → 분할 매수 기회</span></div>
      </div>
      <div class="point">
        <div class="badge">2</div>
        <div class="pt-card"><span class="pt-text">현대차 급등 = 로봇·피지컬 AI 테마 (보스턴다이나믹스 아틀라스)</span></div>
      </div>
      <div class="point">
        <div class="badge">3</div>
        <div class="pt-card"><span class="pt-text">기아·현대모비스 상대 매력 ↑ — Top Pick 변경 (한국투자증권)</span></div>
      </div>
      <div class="point">
        <div class="badge">4</div>
        <div class="pt-card"><span class="pt-text">삼전·하이닉스 시총 코스피의 40.77% — 쉬면 시장 전체가 빠지는 착시</span></div>
      </div></div>
  <div class="footer">
    <span>12시에 만나요 | 주식 분석 블로그</span>
    <span class="footer-tag">✅ 핵심 포인트</span>
  </div>
</div>
</body></html>
