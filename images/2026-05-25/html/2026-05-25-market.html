<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  /* 로컬 NanumGothic Bold/ExtraBold만 사용 — Regular(400)는 제거해서 항상 굵은 글자 보장 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'), local('나눔고딕 Bold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'), local('나눔고딕 ExtraBold'); font-weight: 800 900; }
  /* 400 weight 요청 시에도 700으로 폴백 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 1 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#3B82F6"/>
    <stop offset="100%" style="stop-color:#06B6D4"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#F59E0B"/>
    <stop offset="100%" style="stop-color:#EF4444"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text x="48" y="80" fill="#64748B" font-size="24" font-weight="700" letter-spacing="6">MARKET STATUS</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="148" fill="#FFFFFF" font-size="58" font-weight="800">시장 분석 & 투자 전략</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>


  <!-- HERO 영역 -->
  <text x="48" y="270" fill="url(#hero)" font-size="118" font-weight="900" filter="url(#glow)">8,000</text>
  <text x="48" y="318" fill="#94A3B8" font-size="24" font-weight="700">코스피 시대 진입</text>

  <!-- 우측 변동 표시 (방향 자동 분기) -->
  <polygon points="900,275 960,275 930,220" fill="#EF4444" opacity="0.95"/>
  <text x="930" y="312" text-anchor="middle" fill="#EF4444" font-size="22" font-weight="800"></text>

  
  <rect x="48.0" y="380" width="484.0" height="180" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="290.0" y="420" text-anchor="middle" fill="#64748B" font-size="19" font-weight="700" letter-spacing="2">사회적 비중 권장</text>
  <text x="290.0" y="492" text-anchor="middle" fill="#3B82F6" font-size="58" font-weight="900">5%</text>
  <text x="290.0" y="534" text-anchor="middle" fill="#94A3B8" font-size="18"></text>
  <rect x="548.0" y="380" width="484.0" height="180" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="790.0" y="420" text-anchor="middle" fill="#64748B" font-size="19" font-weight="700" letter-spacing="2">자동이체 룰</text>
  <text x="790.0" y="492" text-anchor="middle" fill="#3B82F6" font-size="58" font-weight="900">월 1회</text>
  <text x="790.0" y="534" text-anchor="middle" fill="#94A3B8" font-size="18"></text>
  
  <rect x="48" y="584" width="128" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="112.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">코스피 8천</text>
  <rect x="186" y="584" width="128" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="250.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">임팩트 투자</text>
  <rect x="324" y="584" width="144" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="396.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">ESG ETF</text>
  <rect x="478" y="584" width="128" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="542.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">기부 자동화</text>
  <rect x="616" y="584" width="96" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="664.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">민생경제</text>
  
  <text x="48" y="662" fill="#64748B" font-size="19" font-weight="700" letter-spacing="2">주요 포인트</text>
  <circle cx="60" cy="697" r="14" fill="#3B82F6"/>
  <text x="60" y="702" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">1</text>
  <text x="86" y="704" fill="#FFFFFF" font-size="23" font-weight="700">자산 곡선이 가파를수록 분배 자동화 룰을 먼저 만들어라</text>
  <circle cx="60" cy="739" r="14" fill="#3B82F6"/>
  <text x="60" y="744" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">2</text>
  <text x="86" y="746" fill="#FFFFFF" font-size="23" font-weight="700">단발성 거액보다 정기적 소액이 사회적 자본을 키운다</text>
  <circle cx="60" cy="781" r="14" fill="#3B82F6"/>
  <text x="60" y="786" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">3</text>
  <text x="86" y="788" fill="#FFFFFF" font-size="23" font-weight="700">코스피 8천 시대일수록 ESG·임팩트 비중을 포트폴리오에 끼워라</text>

  <!-- 인용구 박스 -->
  <rect x="48" y="910" width="984" height="120" fill="#1E3A5F" rx="16" opacity="0.75"/>
  <rect x="48" y="910" width="6" height="120" fill="#3B82F6" rx="3"/>
  <text x="76" y="954" fill="#3B82F6" font-size="38" font-weight="900">"</text>
  <text x="104" y="960" fill="#FFFFFF" font-size="32" font-weight="800">모두가 함께 잘 사는 세상은 매수 타이밍이 아니라 분배 설계에서 시작됩니다</text>
  <text x="76" y="1002" fill="#94A3B8" font-size="20" font-weight="700">— 이광수</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1058" text-anchor="end" fill="#64748B" font-size="17" font-weight="700" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
