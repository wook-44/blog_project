<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic'), local('Nanum Gothic'), local('나눔고딕'); font-weight: 400; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'); font-weight: 800 900; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#3B82F6"/>
    <stop offset="100%" style="stop-color:#06B6D4"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#F59E0B"/>
    <stop offset="100%" style="stop-color:#EF4444"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text x="48" y="80" fill="#64748B" font-size="20" font-weight="700" letter-spacing="6">MARKET STATUS</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="148" fill="#FFFFFF" font-size="48" font-weight="800">코스피 7,999.67 — 8천피 직전 반락</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>


  <!-- HERO 영역 -->
  <text x="48" y="280" fill="url(#hero)" font-size="120" font-weight="900" filter="url(#glow)">7,999.67</text>
  <text x="48" y="328" fill="#94A3B8" font-size="24" font-weight="600">코스피 사상 최고</text>

  <!-- 우측 변동 표시 -->
  <polygon points="900,210 930,260 960,210" fill="#3B82F6" opacity="0.95"/>
  <text x="930" y="300" text-anchor="middle" fill="#3B82F6" font-size="22" font-weight="800">8천피 직전</text>

  
  <rect x="48.0" y="370" width="317.3333333333333" height="165" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="206.66666666666666" y="406" text-anchor="middle" fill="#64748B" font-size="17" font-weight="700" letter-spacing="2">외국인 순매도</text>
  <text x="206.66666666666666" y="470" text-anchor="middle" fill="#3B82F6" font-size="52" font-weight="900">-1.1조</text>
  <text x="206.66666666666666" y="506" text-anchor="middle" fill="#94A3B8" font-size="16">차익 실현</text>
  <rect x="381.3333333333333" y="370" width="317.3333333333333" height="165" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="540.0" y="406" text-anchor="middle" fill="#64748B" font-size="17" font-weight="700" letter-spacing="2">개인 순매수</text>
  <text x="540.0" y="470" text-anchor="middle" fill="#3B82F6" font-size="52" font-weight="900">+9,428억</text>
  <text x="540.0" y="506" text-anchor="middle" fill="#94A3B8" font-size="16">흡수</text>
  <rect x="714.6666666666666" y="370" width="317.3333333333333" height="165" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="873.3333333333333" y="406" text-anchor="middle" fill="#64748B" font-size="17" font-weight="700" letter-spacing="2">삼성+SK 시총 비중</text>
  <text x="873.3333333333333" y="470" text-anchor="middle" fill="#3B82F6" font-size="52" font-weight="900">46%</text>
  <text x="873.3333333333333" y="506" text-anchor="middle" fill="#94A3B8" font-size="16">쏠림</text>
  
  <rect x="48" y="520" width="162" height="40" fill="#3B82F61A" rx="20" stroke="#3B82F644" stroke-width="1"/>
  <text x="129.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="700">미국 CPI 경계</text>
  <rect x="218" y="520" width="176" height="40" fill="#3B82F61A" rx="20" stroke="#3B82F644" stroke-width="1"/>
  <text x="306.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="700">ETF 80조 쏠림</text>
  <rect x="402" y="520" width="162" height="40" fill="#3B82F61A" rx="20" stroke="#3B82F644" stroke-width="1"/>
  <text x="483.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="700">1만피 시간 문제</text>
  <rect x="572" y="520" width="218" height="40" fill="#3B82F61A" rx="20" stroke="#3B82F644" stroke-width="1"/>
  <text x="681.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="700">하이닉스·삼성 갭 좁히기</text>
  <rect x="798" y="520" width="148" height="40" fill="#3B82F61A" rx="20" stroke="#3B82F644" stroke-width="1"/>
  <text x="872.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="700">차익 실현 흡수</text>
  
  <text x="48" y="580" fill="#64748B" font-size="17" font-weight="700" letter-spacing="2">주요 포인트</text>
  <circle cx="60" cy="614" r="14" fill="#3B82F6"/>
  <text x="60" y="619" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="800">1</text>
  <text x="88" y="620" fill="#FFFFFF" font-size="21" font-weight="600">외국인 매도 흡수 = 주도 세력 이탈 아님</text>
  <circle cx="60" cy="658" r="14" fill="#3B82F6"/>
  <text x="60" y="663" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="800">2</text>
  <text x="88" y="664" fill="#FFFFFF" font-size="21" font-weight="600">CPI 부합 시 재상승, 서프라이즈 시 조정</text>
  <circle cx="60" cy="702" r="14" fill="#3B82F6"/>
  <text x="60" y="707" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="800">3</text>
  <text x="88" y="708" fill="#FFFFFF" font-size="21" font-weight="600">삼성전자 추가 매수 타이밍 검토</text>

  <!-- 인용구 박스 -->
  <rect x="48" y="950" width="984" height="78" fill="#1E3A5F" rx="14" opacity="0.55"/>
  <text x="68" y="980" fill="#94A3B8" font-size="18">"</text>
  <text x="84" y="982" fill="#FFFFFF" font-size="21" font-weight="600">1만피는 시간 문제, 오늘은 아닐 뿐</text>
  <text x="68" y="1012" fill="#64748B" font-size="16">— 이광수 (광수네 복덕방)</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1056" text-anchor="end" fill="#334155" font-size="14" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
