<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  /* 로컬 NanumGothic Bold/ExtraBold만 사용 — Regular(400)는 제거해서 항상 굵은 글자 보장 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'), local('나눔고딕 Bold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'), local('나눔고딕 ExtraBold'); font-weight: 800 900; }
  /* 400 weight 요청 시에도 700으로 폴백 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 1 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#A78BFA"/>
    <stop offset="100%" style="stop-color:#EC4899"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#FBBF24"/>
    <stop offset="100%" style="stop-color:#F472B6"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text x="48" y="80" fill="#64748B" font-size="20" font-weight="700" letter-spacing="6">INVESTMENT PSYCHOLOGY</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="148" fill="#FFFFFF" font-size="48" font-weight="800">NBER 40년 — 경험 많은 자가 더 틀린다</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>

  
  <text x="48" y="250" fill="url(#hero)" font-size="52" font-weight="900" filter="url(#glow)">비관도 낙관도 데이터로 검증</text>
  
  <rect x="48.0" y="320" width="317.3333333333333" height="260" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="206.66666666666666" cy="378" r="40" fill="#A78BFA22"/>
  <text x="206.66666666666666" y="392" text-anchor="middle" font-size="44">😱</text>
  <text x="206.66666666666666" y="458" text-anchor="middle" fill="#A78BFA" font-size="24" font-weight="800">그때 망했잖아</text>
  <foreignObject x="64.0" y="478" width="285.3333333333333" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:17px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">1970~80년대 침체 경험이 2026년 상승장 못 보게 함</div>
  </foreignObject>
  <rect x="381.3333333333333" y="320" width="317.3333333333333" height="260" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="540.0" cy="378" r="40" fill="#A78BFA22"/>
  <text x="540.0" y="392" text-anchor="middle" font-size="44">🤯</text>
  <text x="540.0" y="458" text-anchor="middle" fill="#A78BFA" font-size="24" font-weight="800">한국 주식 못 번다</text>
  <foreignObject x="397.3333333333333" y="478" width="285.3333333333333" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:17px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">2025-06 이전 데이터 기반, 다른 시대 지도로 길 찾기</div>
  </foreignObject>
  <rect x="714.6666666666666" y="320" width="317.3333333333333" height="260" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="873.3333333333333" cy="378" r="40" fill="#A78BFA22"/>
  <text x="873.3333333333333" y="392" text-anchor="middle" font-size="44">😩</text>
  <text x="873.3333333333333" y="458" text-anchor="middle" fill="#A78BFA" font-size="24" font-weight="800">너무 올랐다</text>
  <foreignObject x="730.6666666666666" y="478" width="285.3333333333333" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:17px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">비싸다 감각도 과거 레벨 고정된 경험 편향</div>
  </foreignObject>
  
  <rect x="48" y="600" width="984" height="140" fill="#EC48991A" rx="16" stroke="#EC489966" stroke-width="2"/>
  <text x="80" y="642" fill="#EC4899" font-size="17" font-weight="800" letter-spacing="3">✓ 교정 방법</text>
  <foreignObject x="80" y="655" width="920" height="78">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:26px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif">최근 6개월 데이터 vs 3년 이전 경험 분리, 새 데이터로 업데이트</div>
  </foreignObject>

  <!-- 인용구 박스 -->
  <rect x="48" y="950" width="984" height="78" fill="#1E3A5F" rx="14" opacity="0.55"/>
  <text x="68" y="980" fill="#94A3B8" font-size="18">"</text>
  <text x="84" y="982" fill="#FFFFFF" font-size="21" font-weight="700">경험을 이겨내야 한다</text>
  <text x="68" y="1012" fill="#64748B" font-size="16">— 박시동 (경제평론가)</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1056" text-anchor="end" fill="#334155" font-size="14" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
