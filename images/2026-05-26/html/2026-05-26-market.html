<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  /* 로컬 NanumGothic Bold/ExtraBold만 사용 — Regular(400)는 제거해서 항상 굵은 글자 보장 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'), local('나눔고딕 Bold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'), local('나눔고딕 ExtraBold'); font-weight: 800 900; }
  /* 400 weight 요청 시에도 700으로 폴백 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 1 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#3B82F6"/>
    <stop offset="100%" style="stop-color:#06B6D4"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#F59E0B"/>
    <stop offset="100%" style="stop-color:#EF4444"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text x="48" y="80" fill="#64748B" font-size="24" font-weight="700" letter-spacing="6">MARKET STATUS</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="148" fill="#FFFFFF" font-size="58" font-weight="800">코스피 8000 재탈환 & 외국인 매수 복귀</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>


  <!-- HERO 영역 -->
  <text x="48" y="270" fill="url(#hero)" font-size="118" font-weight="900" filter="url(#glow)">8,075</text>
  <text x="48" y="318" fill="#94A3B8" font-size="24" font-weight="700">코스피 지수</text>

  <!-- 우측 변동 표시 (방향 자동 분기) -->
  <polygon points="900,275 960,275 930,220" fill="#EF4444" opacity="0.95"/>
  <text x="930" y="312" text-anchor="middle" fill="#EF4444" font-size="22" font-weight="800">6거래일 만 재탈환</text>

  
  <rect x="48.0" y="380" width="484.0" height="180" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="290.0" y="420" text-anchor="middle" fill="#64748B" font-size="19" font-weight="700" letter-spacing="2">외국인 매수 전환</text>
  <text x="290.0" y="492" text-anchor="middle" fill="#3B82F6" font-size="58" font-weight="900">+13일</text>
  <text x="290.0" y="534" text-anchor="middle" fill="#94A3B8" font-size="18">역대급 매도 → 매수</text>
  <rect x="548.0" y="380" width="484.0" height="180" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="790.0" y="420" text-anchor="middle" fill="#64748B" font-size="19" font-weight="700" letter-spacing="2">삼전 / 닉스 동반 돌파</text>
  <text x="790.0" y="492" text-anchor="middle" fill="#3B82F6" font-size="58" font-weight="900">30만 / 206만</text>
  <text x="790.0" y="534" text-anchor="middle" fill="#94A3B8" font-size="18">트리플 크라운</text>
  
  <rect x="48" y="584" width="160" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="128.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">코스피 8000</text>
  <rect x="218" y="584" width="128" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="282.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">외국인 매수</text>
  <rect x="356" y="584" width="144" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="428.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">트리플 크라운</text>
  <rect x="510" y="584" width="144" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="582.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">유가 91달러</text>
  <rect x="664" y="584" width="160" height="42" fill="#3B82F61A" rx="21" stroke="#3B82F655" stroke-width="1"/>
  <text x="744.0" y="611" text-anchor="middle" fill="#3B82F6" font-size="18" font-weight="700">환율 1508원</text>
  
  <text x="48" y="662" fill="#64748B" font-size="19" font-weight="700" letter-spacing="2">주요 포인트</text>
  <circle cx="60" cy="697" r="14" fill="#3B82F6"/>
  <text x="60" y="702" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">1</text>
  <text x="86" y="704" fill="#FFFFFF" font-size="23" font-weight="700">외국인이 13거래일 만에 매수로 전환, IT·반도체 지분율 10년 내 최저에서 채우기 시작</text>
  <circle cx="60" cy="739" r="14" fill="#3B82F6"/>
  <text x="60" y="744" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">2</text>
  <text x="86" y="746" fill="#FFFFFF" font-size="23" font-weight="700">호르무즈 30일 정상 개방 합의 임박, 유가 90달러대 진입</text>
  <circle cx="60" cy="781" r="14" fill="#3B82F6"/>
  <text x="60" y="786" text-anchor="middle" fill="#0F172A" font-size="18" font-weight="800">3</text>
  <text x="86" y="788" fill="#FFFFFF" font-size="23" font-weight="700">삼전 30만·하이닉스 200만·코스피 8000 트리플 크라운 장중 동반 돌파</text>

  <!-- 인용구 박스 -->
  <rect x="48" y="910" width="984" height="120" fill="#1E3A5F" rx="16" opacity="0.75"/>
  <rect x="48" y="910" width="6" height="120" fill="#3B82F6" rx="3"/>
  <text x="76" y="954" fill="#3B82F6" font-size="38" font-weight="900">"</text>
  <text x="104" y="960" fill="#FFFFFF" font-size="32" font-weight="800">코스피 8000 재탈환의 진짜 신호는 지수가 아니라 외국인 13거래일 매수 전환이다</text>
  <text x="76" y="1002" fill="#94A3B8" font-size="20" font-weight="700">— 이광수·박시동</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1058" text-anchor="end" fill="#64748B" font-size="17" font-weight="700" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
