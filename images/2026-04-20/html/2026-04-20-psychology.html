<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic'), local('Nanum Gothic'), local('나눔고딕'); font-weight: 400; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'); font-weight: 800 900; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#A78BFA"/>
    <stop offset="100%" style="stop-color:#EC4899"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#FBBF24"/>
    <stop offset="100%" style="stop-color:#F472B6"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 날짜 배지 -->
  <rect x="48" y="44" width="220" height="42" fill="#A78BFA33" rx="21" stroke="#A78BFA66" stroke-width="1"/>
  <text x="158" y="71" text-anchor="middle" fill="#A78BFA" font-size="16" font-weight="700">📅 2026년 4월 20일</text>

  <!-- 섹션 라벨 -->
  <text x="48" y="138" fill="#64748B" font-size="16" font-weight="700" letter-spacing="6">INVESTMENT PSYCHOLOGY</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="186" fill="#FFFFFF" font-size="38" font-weight="800">공포에 팔지 마라, 학습하라</text>

  <!-- 디바이더 -->
  <rect x="48" y="206" width="100" height="5" fill="url(#accent)" rx="2"/>

  
  <text x="48" y="290" fill="url(#hero)" font-size="44" font-weight="900" filter="url(#glow)">시장은 이미 메타 학습 중</text>
  
  <rect x="48.0" y="360" width="317.3333333333333" height="200" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="206.66666666666666" cy="410" r="32" fill="#A78BFA22"/>
  <text x="206.66666666666666" y="420" text-anchor="middle" font-size="34">😱</text>
  <text x="206.66666666666666" y="470" text-anchor="middle" fill="#A78BFA" font-size="20" font-weight="800">헤드라인 매매</text>
  <foreignObject x="64.0" y="486" width="285.3333333333333" height="64">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:14px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">뉴스 단어 보고 즉각 매도, 시장은 이미 선반영</div>
  </foreignObject>
  <rect x="381.3333333333333" y="360" width="317.3333333333333" height="200" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="540.0" cy="410" r="32" fill="#A78BFA22"/>
  <text x="540.0" y="420" text-anchor="middle" font-size="34">🤯</text>
  <text x="540.0" y="470" text-anchor="middle" fill="#A78BFA" font-size="20" font-weight="800">지수 위치 혼동</text>
  <foreignObject x="397.3333333333333" y="486" width="285.3333333333333" height="64">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:14px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">6,219가 비싸다고 관망, PER 7.5배는 저평가</div>
  </foreignObject>
  <rect x="714.6666666666666" y="360" width="317.3333333333333" height="200" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="873.3333333333333" cy="410" r="32" fill="#A78BFA22"/>
  <text x="873.3333333333333" y="420" text-anchor="middle" font-size="34">😩</text>
  <text x="873.3333333333333" y="470" text-anchor="middle" fill="#A78BFA" font-size="20" font-weight="800">악재에 팔고 호재에 사기</text>
  <foreignObject x="730.6666666666666" y="486" width="285.3333333333333" height="64">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:14px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">공포에 팔고 6,600 돌파 후 추격하는 최악의 사이클</div>
  </foreignObject>
  
  <rect x="48" y="580" width="984" height="120" fill="#EC48991A" rx="16" stroke="#EC489966" stroke-width="2"/>
  <text x="80" y="620" fill="#EC4899" font-size="14" font-weight="800" letter-spacing="3">✓ 교정 방법</text>
  <foreignObject x="80" y="630" width="920" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:22px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif">뉴스 이후가 아닌 이전의 EPS·PER로 판단하라</div>
  </foreignObject>

  <!-- 인용구 박스 -->
  <rect x="48" y="950" width="984" height="78" fill="#1E3A5F" rx="14" opacity="0.55"/>
  <text x="68" y="980" fill="#94A3B8" font-size="14">"</text>
  <text x="84" y="980" fill="#FFFFFF" font-size="18" font-weight="600">공포 뉴스는 기관이 받아주는 매수 기회다</text>
  <text x="68" y="1008" fill="#64748B" font-size="13">— 박시동 (경제평론가)</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1056" text-anchor="end" fill="#334155" font-size="13" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
