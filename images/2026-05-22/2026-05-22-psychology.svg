<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#A78BFA"/>
    <stop offset="100%" style="stop-color:#EC4899"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#FBBF24"/>
    <stop offset="100%" style="stop-color:#F472B6"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="48" y="80" fill="#64748B" font-size="24" font-weight="700" letter-spacing="6">INVESTMENT PSYCHOLOGY</text>

  <!-- 메인 타이틀 -->
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="48" y="148" fill="#FFFFFF" font-size="58" font-weight="800">투자 심리 & 행동 교정</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>

  
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="48" y="250" fill="url(#hero)" font-size="62" font-weight="900" filter="url(#glow)">변동성 폭발 구간일수록 평정심이 가장 큰 수익</text>
  
  <rect x="48.0" y="320" width="317.3333333333333" height="290" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="206.66666666666666" cy="386" r="44" fill="#A78BFA22"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="206.66666666666666" y="402" text-anchor="middle" font-size="53">😱</text>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="206.66666666666666" y="478" text-anchor="middle" fill="#A78BFA" font-size="29" font-weight="800">어제 못 탔다는 FOMO</text>
  <foreignObject x="64.0" y="502" width="285.3333333333333" height="96">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:20px;line-height:1.5;text-align:center;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">코스피 +8.42% 폭등 직후 코스닥 +4.72% 추격매수 → 고점 매수 확률 ↑</div>
  </foreignObject>
  <rect x="381.3333333333333" y="320" width="317.3333333333333" height="290" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="540.0" cy="386" r="44" fill="#A78BFA22"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="540.0" y="402" text-anchor="middle" font-size="53">🤯</text>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="540.0" y="478" text-anchor="middle" fill="#A78BFA" font-size="29" font-weight="800">단가 낮으면 안전 착각</text>
  <foreignObject x="397.3333333333333" y="502" width="285.3333333333333" height="96">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:20px;line-height:1.5;text-align:center;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">스타벅스 한 잔 가격 코스닥 한 주 = 진입장벽 낮음 의미, 사업 실체와 수급이 진짜 판단 기준</div>
  </foreignObject>
  <rect x="714.6666666666666" y="320" width="317.3333333333333" height="290" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="873.3333333333333" cy="386" r="44" fill="#A78BFA22"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="873.3333333333333" y="402" text-anchor="middle" font-size="53">😩</text>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="873.3333333333333" y="478" text-anchor="middle" fill="#A78BFA" font-size="29" font-weight="800">헤지성 매수 오인</text>
  <foreignObject x="730.6666666666666" y="502" width="285.3333333333333" height="96">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:20px;line-height:1.5;text-align:center;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">외국인 6일 연속 순매수가 장기 자금성인지 단기 헤지성인지 6월 첫 거래일 수급으로 재확인</div>
  </foreignObject>
  
  <rect x="48" y="630" width="984" height="160" fill="#EC48991A" rx="16" stroke="#EC489966" stroke-width="2"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="80" y="678" fill="#EC4899" font-size="20" font-weight="800" letter-spacing="3">✓ 교정 방법</text>
  <foreignObject x="80" y="692" width="920" height="92">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:31px;font-weight:700;line-height:1.45;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">6월 첫 거래일 외국인 코스닥 매매 방향 → 7일째도 순매수면 자금성, 매도 전환이면 헤지성. 분할 매수로 변동성 흡수.</div>
  </foreignObject>

  <!-- 인용구 박스 -->
  <rect x="48" y="910" width="984" height="120" fill="#1E3A5F" rx="16" opacity="0.75"/>
  <rect x="48" y="910" width="6" height="120" fill="#A78BFA" rx="3"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="76" y="954" fill="#A78BFA" font-size="38" font-weight="900">"</text>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="104" y="960" fill="#FFFFFF" font-size="32" font-weight="800">개미가 아니라 국민투자자</text>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="76" y="1002" fill="#94A3B8" font-size="20" font-weight="700">— 이광수</text>

  <!-- 우측 하단 브랜딩 -->
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="1032" y="1058" text-anchor="end" fill="#64748B" font-size="17" font-weight="700" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg>