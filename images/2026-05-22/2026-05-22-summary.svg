<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#10B981"/>
    <stop offset="100%" style="stop-color:#06B6D4"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#10B981"/>
    <stop offset="100%" style="stop-color:#3B82F6"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="48" y="80" fill="#64748B" font-size="24" font-weight="700" letter-spacing="6">KEY POINTS TODAY</text>

  <!-- 메인 타이틀 -->
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="48" y="148" fill="#FFFFFF" font-size="58" font-weight="800">오늘의 핵심 포인트</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>

  
  <rect x="48" y="200" width="984" height="160" fill="#10B9811A" rx="18" stroke="#10B98166" stroke-width="2"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="80" y="244" fill="#10B981" font-size="20" font-weight="800" letter-spacing="3">⭐ TODAY'S TAKEAWAY</text>
  <foreignObject x="80" y="260" width="920" height="94">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:36px;font-weight:800;line-height:1.4;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">코스피·코스닥 5월 격차 +85% vs +20%, 오늘부터 메워지기 시작</div>
  </foreignObject>
  
  <rect x="48" y="380" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="426" r="30" fill="url(#accent)"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="92" y="437" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">1</text>
  <foreignObject x="142" y="398" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">코스피·코스닥 갭 메우기 시작 — +0.23% vs +4.72%로 첫 반전</div>
  </foreignObject>
  <rect x="48" y="472" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="518" r="30" fill="url(#accent)"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="92" y="529" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">2</text>
  <foreignObject x="142" y="490" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">외국인 수급 방향 코스닥으로 굳어진 6일째 — 누적 +1.6조</div>
  </foreignObject>
