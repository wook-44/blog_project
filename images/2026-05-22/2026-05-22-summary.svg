  <circle cx="92" cy="610" r="30" fill="url(#accent)"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="92" y="621" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">3</text>
  <foreignObject x="142" y="582" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">국민성장펀드 1차 공모 즉시 마감 — 가계 자본시장 회전 의지 확인</div>
  </foreignObject>
  <rect x="48" y="656" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="702" r="30" fill="url(#accent)"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="92" y="713" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">4</text>
  <foreignObject x="142" y="674" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">AI 후공정·로봇·이차전지·태양광 일제 상승 — 순환매 본격화</div>
  </foreignObject>
  <rect x="48" y="748" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="794" r="30" fill="url(#accent)"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="92" y="805" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">5</text>
  <foreignObject x="142" y="766" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">6월 첫 거래일 수급이 다음 분기점 — 분할 매수 권장</div>
  </foreignObject>

  <!-- 인용구 박스 -->
  <rect x="48" y="910" width="984" height="120" fill="#1E3A5F" rx="16" opacity="0.75"/>
  <rect x="48" y="910" width="6" height="120" fill="#10B981" rx="3"/>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="76" y="954" fill="#10B981" font-size="38" font-weight="900">"</text>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="104" y="960" fill="#FFFFFF" font-size="32" font-weight="800">단가가 아니라 사업 실체와 수급 흐름을 본다</text>
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="76" y="1002" fill="#94A3B8" font-size="20" font-weight="700">— 오늘의 결론</text>

  <!-- 우측 하단 브랜딩 -->
  <text font-family="'NanumGothic','Nanum Gothic','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" x="1032" y="1058" text-anchor="end" fill="#64748B" font-size="17" font-weight="700" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

