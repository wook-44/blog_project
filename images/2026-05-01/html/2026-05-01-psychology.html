<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  /* 로컬 NanumGothic Bold/ExtraBold만 사용 — Regular(400)는 제거해서 항상 굵은 글자 보장 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'), local('나눔고딕 Bold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'), local('나눔고딕 ExtraBold'); font-weight: 800 900; }
  /* 400 weight 요청 시에도 700으로 폴백 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 1 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#A78BFA"/>
    <stop offset="100%" style="stop-color:#EC4899"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#FBBF24"/>
    <stop offset="100%" style="stop-color:#F472B6"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text x="48" y="80" fill="#64748B" font-size="24" font-weight="700" letter-spacing="6">INVESTMENT PSYCHOLOGY</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="148" fill="#FFFFFF" font-size="58" font-weight="800">공포는 반응이지 결정이 아니다</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>

  
  <text x="48" y="250" fill="url(#hero)" font-size="62" font-weight="900" filter="url(#glow)">수익 정점이 심리 가장 취약</text>
  
  <rect x="48.0" y="320" width="317.3333333333333" height="290" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="206.66666666666666" cy="386" r="44" fill="#A78BFA22"/>
  <text x="206.66666666666666" y="402" text-anchor="middle" font-size="53">😱</text>
  <text x="206.66666666666666" y="478" text-anchor="middle" fill="#A78BFA" font-size="29" font-weight="800">수익 정점 차익 충동</text>
  <foreignObject x="64.0" y="502" width="285.3333333333333" height="96">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:20px;line-height:1.5;text-align:center;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">30% 올랐으니 빼야 하나, 그러나 추세 유지</div>
  </foreignObject>
  <rect x="381.3333333333333" y="320" width="317.3333333333333" height="290" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="540.0" cy="386" r="44" fill="#A78BFA22"/>
  <text x="540.0" y="402" text-anchor="middle" font-size="53">🤯</text>
  <text x="540.0" y="478" text-anchor="middle" fill="#A78BFA" font-size="29" font-weight="800">공포-결정 혼동</text>
  <foreignObject x="397.3333333333333" y="502" width="285.3333333333333" height="96">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:20px;line-height:1.5;text-align:center;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">외국인 1조 매도에 패닉 = 결정 아닌 반응</div>
  </foreignObject>
  <rect x="714.6666666666666" y="320" width="317.3333333333333" height="290" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="873.3333333333333" cy="386" r="44" fill="#A78BFA22"/>
  <text x="873.3333333333333" y="402" text-anchor="middle" font-size="53">😩</text>
  <text x="873.3333333333333" y="478" text-anchor="middle" fill="#A78BFA" font-size="29" font-weight="800">사상 최고치 추격</text>
  <foreignObject x="730.6666666666666" y="502" width="285.3333333333333" height="96">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:20px;line-height:1.5;text-align:center;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">매 구간 비싸다 망설이다 더 비싸게 매수</div>
  </foreignObject>
  
  <rect x="48" y="630" width="984" height="160" fill="#EC48991A" rx="16" stroke="#EC489966" stroke-width="2"/>
  <text x="80" y="678" fill="#EC4899" font-size="20" font-weight="800" letter-spacing="3">✓ 교정 방법</text>
  <foreignObject x="80" y="692" width="920" height="92">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:31px;font-weight:700;line-height:1.45;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">비중 70% 유지 + 30% 부분 차익실현 + 24시간 보류</div>
  </foreignObject>

  <!-- 인용구 박스 -->
  <rect x="48" y="910" width="984" height="120" fill="#1E3A5F" rx="16" opacity="0.75"/>
  <rect x="48" y="910" width="6" height="120" fill="#A78BFA" rx="3"/>
  <text x="76" y="954" fill="#A78BFA" font-size="38" font-weight="900">"</text>
  <text x="104" y="960" fill="#FFFFFF" font-size="32" font-weight="800">결정인가 반응인가, 자문이 우선</text>
  <text x="76" y="1002" fill="#94A3B8" font-size="20" font-weight="700">— 김경일 (인지심리학자)</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1058" text-anchor="end" fill="#64748B" font-size="17" font-weight="700" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
