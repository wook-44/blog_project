<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic'), local('Nanum Gothic'), local('나눔고딕'); font-weight: 400; }

  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }

<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

    <stop offset="100%" style="stop-color:#F472B6"/>

  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  </foreignObject>
  <rect x="381.3333333333333" y="320" width="317.3333333333333" height="200" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="540.0" cy="370" r="32" fill="#A78BFA22"/>
  <text x="540.0" y="380" text-anchor="middle" font-size="34">🤯</text>

    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#94A3B8;font-size:14px;line-height:1.45;text-align:center;font-family:NanumGothic,sans-serif">37.6조 어닝 = 차익실현, 신고가에 추가 매수</div>
  </foreignObject>
  <rect x="714.6666666666666" y="320" width="317.3333333333333" height="200" fill="#1E293B" rx="16" stroke="#A78BFA44" stroke-width="2"/>
  <circle cx="873.3333333333333" cy="370" r="32" fill="#A78BFA22"/>
  <text x="873.3333333333333" y="380" text-anchor="middle" font-size="34">😩</text>

  <rect x="48" y="540" width="984" height="120" fill="#EC48991A" rx="16" stroke="#EC489966" stroke-width="2"/>
  <text x="80" y="580" fill="#EC4899" font-size="14" font-weight="800" letter-spacing="3">✓ 교정 방법</text>
  <foreignObject x="80" y="590" width="920" height="60">

  <text x="1032" y="1056" text-anchor="end" fill="#334155" font-size="13" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>
