  <!-- 인용구 박스 -->
  <rect x="48" y="910" width="984" height="120" fill="#1E3A5F" rx="16" opacity="0.75"/>
  <rect x="48" y="910" width="6" height="120" fill="#3B82F6" rx="3"/>
  <text x="76" y="954" fill="#3B82F6" font-size="38" font-weight="900">"</text>
