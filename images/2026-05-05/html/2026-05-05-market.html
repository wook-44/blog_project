<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  /* 로컬 NanumGothic Bold/ExtraBold만 사용 — Regular(400)는 제거해서 항상 굵은 글자 보장 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'), local('나눔고딕 Bold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'), local('나눔고딕 ExtraBold'); font-weight: 800 900; }
  /* 400 weight 요청 시에도 700으로 폴백 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 1 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#3B82F6"/>
    <stop offset="100%" style="stop-color:#06B6D4"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#F59E0B"/>
    <stop offset="100%" style="stop-color:#EF4444"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text x="48" y="80" fill="#64748B" font-size="24" font-weight="700" letter-spacing="6">MARKET STATUS</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="148" fill="#FFFFFF" font-size="58" font-weight="800">전세사기 — 이광수도 속는다</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>


  <!-- HERO 영역 -->
  <text x="48" y="280" fill="url(#hero)" font-size="144" font-weight="900" filter="url(#glow)">10%+</text>
  <text x="48" y="328" fill="#94A3B8" font-size="29" font-weight="700">시세 대비 저렴</text>

  <!-- 우측 변동 표시 -->
  <polygon points="900,210 930,260 960,210" fill="#3B82F6" opacity="0.95"/>
  <text x="930" y="300" text-anchor="middle" fill="#3B82F6" font-size="26" font-weight="800">위험 신호</text>

  
  <rect x="48.0" y="370" width="317.3333333333333" height="190" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="206.66666666666666" y="414" text-anchor="middle" fill="#64748B" font-size="20" font-weight="700" letter-spacing="2">등기·신용·선순위</text>
  <text x="206.66666666666666" y="488" text-anchor="middle" fill="#3B82F6" font-size="62" font-weight="900">3중</text>
  <text x="206.66666666666666" y="532" text-anchor="middle" fill="#94A3B8" font-size="19">필수 체크</text>
  <rect x="381.3333333333333" y="370" width="317.3333333333333" height="190" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="540.0" y="414" text-anchor="middle" fill="#64748B" font-size="20" font-weight="700" letter-spacing="2">자산 분산 한계</text>
  <text x="540.0" y="488" text-anchor="middle" fill="#3B82F6" font-size="62" font-weight="900">50%</text>
  <text x="540.0" y="532" text-anchor="middle" fill="#94A3B8" font-size="19">단일 초과 X</text>
  <rect x="714.6666666666666" y="370" width="317.3333333333333" height="190" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="873.3333333333333" y="414" text-anchor="middle" fill="#64748B" font-size="20" font-weight="700" letter-spacing="2">결정 보류 원칙</text>
  <text x="873.3333333333333" y="488" text-anchor="middle" fill="#3B82F6" font-size="62" font-weight="900">3일</text>
  <text x="873.3333333333333" y="532" text-anchor="middle" fill="#94A3B8" font-size="19">시간 압박 경계</text>
  
  <rect x="48" y="520" width="78" height="46" fill="#3B82F61A" rx="23" stroke="#3B82F644" stroke-width="1"/>
  <text x="87.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="19" font-weight="700">조수진</text>
  <rect x="134" y="520" width="78" height="46" fill="#3B82F61A" rx="23" stroke="#3B82F644" stroke-width="1"/>
  <text x="173.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="19" font-weight="700">박동현</text>
  <rect x="220" y="520" width="218" height="46" fill="#3B82F61A" rx="23" stroke="#3B82F644" stroke-width="1"/>
  <text x="329.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="19" font-weight="700">HUG·SGI 의무 가입</text>
  <rect x="446" y="520" width="218" height="46" fill="#3B82F61A" rx="23" stroke="#3B82F644" stroke-width="1"/>
  <text x="555.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="19" font-weight="700">변호사 자문 20~50만</text>
  <rect x="672" y="520" width="190" height="46" fill="#3B82F61A" rx="23" stroke="#3B82F644" stroke-width="1"/>
  <text x="767.0" y="546" text-anchor="middle" fill="#3B82F6" font-size="19" font-weight="700">임대인 다주택자 위험</text>
  
  <text x="48" y="580" fill="#64748B" font-size="20" font-weight="700" letter-spacing="2">주요 포인트</text>
  <circle cx="60" cy="614" r="14" fill="#3B82F6"/>
  <text x="60" y="619" text-anchor="middle" fill="#0F172A" font-size="19" font-weight="800">1</text>
  <text x="88" y="620" fill="#FFFFFF" font-size="25" font-weight="700">싸다 = 좋다 착각이 가장 큰 함정</text>
  <circle cx="60" cy="658" r="14" fill="#3B82F6"/>
  <text x="60" y="663" text-anchor="middle" fill="#0F172A" font-size="19" font-weight="800">2</text>
  <text x="88" y="664" fill="#FFFFFF" font-size="25" font-weight="700">중개인 한 마디 의존 X, 본인 검증</text>
  <circle cx="60" cy="702" r="14" fill="#3B82F6"/>
  <text x="60" y="707" text-anchor="middle" fill="#0F172A" font-size="19" font-weight="800">3</text>
  <text x="88" y="708" fill="#FFFFFF" font-size="25" font-weight="700">주식+부동산+현금 분산 원칙</text>

  <!-- 인용구 박스 -->
  <rect x="48" y="950" width="984" height="78" fill="#1E3A5F" rx="14" opacity="0.55"/>
  <text x="68" y="980" fill="#94A3B8" font-size="22">"</text>
  <text x="84" y="982" fill="#FFFFFF" font-size="25" font-weight="700">이유 없이 저렴한 매물은 위험 프리미엄</text>
  <text x="68" y="1012" fill="#64748B" font-size="19">— 조수진 (부동산 전문가)</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1056" text-anchor="end" fill="#334155" font-size="17" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
