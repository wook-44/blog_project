<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 900px; height: 900px; overflow: hidden;
    background: #0D1117;
    font-family: 'NanumGothic', 'Nanum Gothic', 'Apple SD Gothic Neo', 'Malgun Gothic',
                 'Noto Sans KR', sans-serif;
    color: #E6EDF3;
    position: relative;
  }
  .accent-bar {
    position: absolute; left: 0; top: 0;
    width: 7px; height: 100%;
    background: #58A6FF;
  }
  .container {
    padding: 36px 48px 28px 64px;
    height: 100%; display: flex; flex-direction: column;
  }
  .header { margin-bottom: 16px; }
  .section-title {
    font-size: 26px; font-weight: 700;
    color: #E6EDF3; line-height: 1.2;
  }
  .divider {
    height: 1px; background: #21262D;
    margin: 14px 0;
  }
  .footer {
    margin-top: auto;
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 12px; border-top: 1px solid #21262D;
    font-size: 12px; color: #8B949E;
  }
  .footer-tag { color: #58A6FF; font-weight: 600; }

      .body { display: flex; gap: 40px; flex: 1; align-items: flex-start; margin-top: 4px; }
      .stat-card {
        min-width: 220px; max-width: 220px; height: 180px;
        background: #1C2B3A; border-radius: 14px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 10px;
        border: 1px solid #58A6FF22;
      }
      .stat-value { font-size: 38px; font-weight: 800; color: #58A6FF; }
      .stat-label { font-size: 13px; color: #8B949E; }
      .points-wrap { flex: 1; }
      .points-label { font-size: 12px; color: #8B949E; margin-bottom: 10px; letter-spacing: 0.5px; }
      .point {
        display: flex; align-items: center; gap: 14px;
        margin-bottom: 16px;
      }
      .badge {
        width: 26px; height: 26px; border-radius: 50%;
        background: #58A6FF; color: #0D1117;
        font-size: 12px; font-weight: 700;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .pt-text { font-size: 14px; color: #E6EDF3; line-height: 1.4; }
    </style></head><body>
<div class="accent-bar"></div>
<div class="container">
  <div class="header">
    <div class="section-title">📊&nbsp; 시장 분석 & 투자 전략</div>
  </div>
  <div class="divider"></div>
  <div class="body">
    <div class="stat-card">
      <div class="stat-value">코스피 7,400 터치</div>
      <div class="stat-label">핵심 지표</div>
    </div>
    <div class="points-wrap">
      <div class="points-label">주요 포인트</div>
      
      <div class="point">
        <span class="badge">1</span>
        <span class="pt-text">삼성전자·SK하이닉스 주도, 외국인 집중 매수</span>
      </div>
      <div class="point">
        <span class="badge">2</span>
        <span class="pt-text">5월 4일 6,900에서 이틀 만에 7,400 급등</span>
      </div>
      <div class="point">
        <span class="badge">3</span>
        <span class="pt-text">AI 반도체 구조적 수요가 핵심 동력</span>
      </div>
      <div class="point">
        <span class="badge">4</span>
        <span class="pt-text">코스피/반도체 ETF 분산 접근 유효</span>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>12시에 만나요 | 주식 분석 블로그</span>
    <span class="footer-tag">📊 시장 분석</span>
  </div>
</div>
</body></html>
