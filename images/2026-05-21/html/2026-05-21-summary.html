<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  /* 로컬 NanumGothic Bold/ExtraBold만 사용 — Regular(400)는 제거해서 항상 굵은 글자 보장 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'), local('나눔고딕 Bold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'), local('나눔고딕 ExtraBold'); font-weight: 800 900; }
  /* 400 weight 요청 시에도 700으로 폴백 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 1 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#10B981"/>
    <stop offset="100%" style="stop-color:#06B6D4"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#10B981"/>
    <stop offset="100%" style="stop-color:#3B82F6"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text x="48" y="80" fill="#64748B" font-size="24" font-weight="700" letter-spacing="6">KEY POINTS TODAY</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="148" fill="#FFFFFF" font-size="58" font-weight="800">오늘의 핵심 포인트</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>

  
  <rect x="48" y="200" width="984" height="160" fill="#10B9811A" rx="18" stroke="#10B98166" stroke-width="2"/>
  <text x="80" y="244" fill="#10B981" font-size="20" font-weight="800" letter-spacing="3">⭐ TODAY'S TAKEAWAY</text>
  <foreignObject x="80" y="260" width="920" height="94">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:36px;font-weight:800;line-height:1.4;font-family:NanumGothic,sans-serif;word-break:keep-all;overflow-wrap:break-word">삼전 노사 타결 + 엔비디아 HBM4 양산 + 코스피 +7% — 자사주 매입 프로그램이 멀티플을 바꾼다</div>
  </foreignObject>
  
  <rect x="48" y="380" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="426" r="30" fill="url(#accent)"/>
  <text x="92" y="437" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">1</text>
  <foreignObject x="142" y="398" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">삼성전자 노사 극적 타결 — 사업 성과 10.5% 반도체 특별 성과급 신설, 1인당 6억 추정</div>
  </foreignObject>
  <rect x="48" y="472" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="518" r="30" fill="url(#accent)"/>
  <text x="92" y="529" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">2</text>
  <foreignObject x="142" y="490" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">자사주 지급 (1/3 즉시 · 1/3 1년 · 1/3 2년 락업) — RSU 방식 도입으로 노조·주주 같은 방향</div>
  </foreignObject>
  <rect x="48" y="564" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="610" r="30" fill="url(#accent)"/>
  <text x="92" y="621" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">3</text>
  <foreignObject x="142" y="582" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">31조 규모 vs 현 자사주 23조 — 부족분 자사주 매입 프로그램 발동 가능성</div>
  </foreignObject>
  <rect x="48" y="656" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="702" r="30" fill="url(#accent)"/>
  <text x="92" y="713" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">4</text>
  <foreignObject x="142" y="674" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">엔비디아 베라루빈 3분기 양산 — SK하이닉스 HBM4 수율 우려 해소</div>
  </foreignObject>
  <rect x="48" y="748" width="984" height="92" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
  <circle cx="92" cy="794" r="30" fill="url(#accent)"/>
  <text x="92" y="805" text-anchor="middle" fill="#0F172A" font-size="31" font-weight="900">5</text>
  <foreignObject x="142" y="766" width="876" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#FFFFFF;font-size:25px;font-weight:700;line-height:1.4;font-family:NanumGothic,sans-serif;display:flex;align-items:center;height:56px;word-break:keep-all;overflow-wrap:break-word">스페이스X 6/12 상장 + 오픈AI 9월 상장 — 시중 자금 흡수, 우주株 회유</div>
  </foreignObject>

  <!-- 인용구 박스 -->
  <rect x="48" y="910" width="984" height="120" fill="#1E3A5F" rx="16" opacity="0.75"/>
  <rect x="48" y="910" width="6" height="120" fill="#10B981" rx="3"/>
  <text x="76" y="954" fill="#10B981" font-size="38" font-weight="900">"</text>
  <text x="104" y="960" fill="#FFFFFF" font-size="32" font-weight="800">30만원·200만원·8000은 시간문제, 첫 돌파 변동성 관리가 핵심</text>
  <text x="76" y="1002" fill="#94A3B8" font-size="20" font-weight="700">— 오늘의 정리</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1058" text-anchor="end" fill="#64748B" font-size="17" font-weight="700" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
