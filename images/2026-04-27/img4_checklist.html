<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NanumGothic';
    src: local('NanumGothic'), local('Nanum Gothic'), local('나눔고딕');
    font-weight: 400;
  }
  @font-face {
    font-family: 'NanumGothic';
    src: local('NanumGothic Bold'), local('NanumGothicBold');
    font-weight: 700;
  }
  @font-face {
    font-family: 'NanumGothic';
    src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold');
    font-weight: 800 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 800px; height: 450px; overflow: hidden; background: transparent; }
  svg { width: 800px; height: 450px; display: block; }
</style>
</head>
<body>
<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic', 'Nanum Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#0F2035"/>
    </linearGradient>
    <linearGradient id="teal_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg4)" rx="16"/>
  <rect x="0" y="0" width="800" height="4" fill="url(#teal_grad)" rx="2"/>

  <!-- Header -->
  <text x="32" y="48" fill="#64748B" font-size="12" font-weight="600" letter-spacing="3">WEEKLY CHECKLIST</text>
  <text x="32" y="82" fill="white" font-size="26" font-weight="700">이번 주 놓치면 안 되는 3가지</text>
  <rect x="32" y="94" width="60" height="3" fill="url(#teal_grad)" rx="2"/>

  <!-- Item 1 -->
  <rect x="32" y="118" width="736" height="86" fill="#0F2A3A" rx="12" stroke="#0E4D6A" stroke-width="1"/>
  <!-- Number -->
  <circle cx="74" cy="161" r="22" fill="#06B6D4" opacity="0.2"/>
  <circle cx="74" cy="161" r="16" fill="#0891B2"/>
  <text x="74" y="166" text-anchor="middle" fill="white" font-size="16" font-weight="800">1</text>
  <!-- Content -->
  <text x="112" y="148" fill="#22D3EE" font-size="15" font-weight="700">미국 빅테크 실적 발표 확인 필수</text>
  <text x="112" y="170" fill="#94A3B8" font-size="13">MS, 아마존 등 주요 실적 이번 주 발표 → 글로벌 증시 방향성 결정 변수</text>
  <!-- Tag -->
  <rect x="634" y="138" width="112" height="24" fill="#164E63" rx="12"/>
  <text x="690" y="155" text-anchor="middle" fill="#67E8F9" font-size="11" font-weight="600">🌐 글로벌 모니터링</text>

  <!-- Item 2 -->
  <rect x="32" y="218" width="736" height="86" fill="#0F2A1A" rx="12" stroke="#14532D" stroke-width="1"/>
  <circle cx="74" cy="261" r="22" fill="#10B981" opacity="0.2"/>
  <circle cx="74" cy="261" r="16" fill="#059669"/>
  <text x="74" y="266" text-anchor="middle" fill="white" font-size="16" font-weight="800">2</text>
  <text x="112" y="248" fill="#34D399" font-size="15" font-weight="700">불타기 전략으로 평단가 관리</text>
  <text x="112" y="270" fill="#94A3B8" font-size="13">오르는 종목에 분할 매수(불타기) → 평단가 조정, 장기 보유 기반 구축</text>
  <rect x="620" y="238" width="126" height="24" fill="#14532D" rx="12"/>
  <text x="683" y="255" text-anchor="middle" fill="#6EE7B7" font-size="11" font-weight="600">📈 매수 전략 실행</text>

  <!-- Item 3 -->
  <rect x="32" y="318" width="736" height="86" fill="#1A0F2A" rx="12" stroke="#4C1D95" stroke-width="1"/>
  <circle cx="74" cy="361" r="22" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="74" cy="361" r="16" fill="#7C3AED"/>
  <text x="74" y="366" text-anchor="middle" fill="white" font-size="16" font-weight="800">3</text>
  <text x="112" y="348" fill="#A78BFA" font-size="15" font-weight="700">전력 기기주 수주 잔고 모니터링</text>
  <text x="112" y="370" fill="#94A3B8" font-size="13">효성중공업 등 수주 잔고 + 주주친화 정책 변화 지속 추적 필요</text>
  <rect x="622" y="338" width="124" height="24" fill="#2D1B69" rx="12"/>
  <text x="684" y="355" text-anchor="middle" fill="#C4B5FD" font-size="11" font-weight="600">⚡ 섹터 집중 관찰</text>

  <text x="768" y="438" text-anchor="end" fill="#334155" font-size="10">12시에 만나요 | 2026.04.27</text>
</svg>

</body>
</html>
