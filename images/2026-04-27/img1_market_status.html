<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NanumGothic';
    src: local('NanumGothic'), local('Nanum Gothic'), local('나눔고딕');
    font-weight: 400;
  }
  @font-face {
    font-family: 'NanumGothic';
    src: local('NanumGothic Bold'), local('NanumGothicBold');
    font-weight: 700;
  }
  @font-face {
    font-family: 'NanumGothic';
    src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold');
    font-weight: 800 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 800px; height: 450px; overflow: hidden; background: transparent; }
  svg { width: 800px; height: 450px; display: block; }
</style>
</head>
<body>
<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic', 'Nanum Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg1)" rx="16"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accent1)" rx="2"/>

  <!-- Date badge -->
  <rect x="32" y="24" width="160" height="28" fill="#1E40AF" rx="14" opacity="0.8"/>
  <text x="112" y="43" text-anchor="middle" fill="#93C5FD" font-size="12" font-weight="600">📅 2026년 4월 27일</text>

  <!-- Section label -->
  <text x="32" y="96" fill="#64748B" font-size="12" font-weight="600" letter-spacing="3">MARKET STATUS</text>

  <!-- Main title -->
  <text x="32" y="130" fill="white" font-size="26" font-weight="700">코스피, 또 다시 역사를 썼다</text>

  <!-- Divider -->
  <rect x="32" y="142" width="60" height="3" fill="url(#accent1)" rx="2"/>

  <!-- Big number - KOSPI -->
  <text x="32" y="220" fill="url(#gold)" font-size="72" font-weight="900" filter="url(#glow)">6,600</text>
  <text x="32" y="245" fill="#94A3B8" font-size="14">코스피 돌파 포인트</text>

  <!-- Arrow up -->
  <polygon points="700,160 720,190 740,160" fill="#10B981" opacity="0.9"/>
  <text x="720" y="210" text-anchor="middle" fill="#10B981" font-size="13" font-weight="700">▲ 사상 최고치</text>

  <!-- Stats cards - row -->
  <g transform="translate(32, 275)">
    <!-- Card 1: 코스닥 -->
    <rect x="0" y="0" width="160" height="80" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
    <text x="80" y="28" text-anchor="middle" fill="#64748B" font-size="11" font-weight="600" letter-spacing="2">코스닥</text>
    <text x="80" y="56" text-anchor="middle" fill="#38BDF8" font-size="28" font-weight="800">1,100</text>
    <text x="80" y="72" text-anchor="middle" fill="#10B981" font-size="11">▲ 돌파</text>

    <!-- Card 2: 시총 -->
    <rect x="176" y="0" width="160" height="80" fill="#1E293B" rx="12" stroke="#334155" stroke-width="1"/>
    <text x="256" y="28" text-anchor="middle" fill="#64748B" font-size="11" font-weight="600" letter-spacing="2">시가총액</text>
    <text x="256" y="56" text-anchor="middle" fill="#F59E0B" font-size="28" font-weight="800">6,000조</text>
    <text x="256" y="72" text-anchor="middle" fill="#10B981" font-size="11">▲ 돌파</text>

    <!-- Card 3: 골드만 목표 -->
    <rect x="352" y="0" width="180" height="80" fill="#1E293B" rx="12" stroke="#F59E0B" stroke-width="1" opacity="0.9"/>
    <text x="442" y="28" text-anchor="middle" fill="#64748B" font-size="11" font-weight="600" letter-spacing="2">골드만삭스 목표</text>
    <text x="442" y="56" text-anchor="middle" fill="#FBBF24" font-size="28" font-weight="800">7,000</text>
    <text x="442" y="72" text-anchor="middle" fill="#F59E0B" font-size="11">★ 보수적 추정</text>
  </g>

  <!-- Quote -->
  <rect x="32" y="375" width="736" height="48" fill="#1E3A5F" rx="10" opacity="0.6"/>
  <text x="48" y="395" fill="#93C5FD" font-size="12">"</text>
  <text x="60" y="395" fill="#CBD5E1" font-size="12">코스피 1만 시대, 이제는 현실적인 목표로 논의되고 있습니다</text>
  <text x="48" y="412" fill="#64748B" font-size="11">— 이광수 애널리스트</text>

  <!-- Bottom right branding -->
  <text x="768" y="435" text-anchor="end" fill="#334155" font-size="10">12시에 만나요 | 2026.04.27</text>
</svg>

</body>
</html>
