<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  /* 로컬 NanumGothic Bold/ExtraBold만 사용 — Regular(400)는 제거해서 항상 굵은 글자 보장 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'), local('나눔고딕 Bold'); font-weight: 700; }
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothicExtraBold'), local('NanumGothic ExtraBold'), local('나눔고딕 ExtraBold'); font-weight: 800 900; }
  /* 400 weight 요청 시에도 700으로 폴백 */
  @font-face { font-family: 'NanumGothic'; src: local('NanumGothic Bold'), local('NanumGothicBold'); font-weight: 1 400; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: transparent; }
  svg { width: 1080px; height: 1080px; display: block; }
</style></head>
<body><svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="'NanumGothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0F172A"/>
    <stop offset="100%" style="stop-color:#1E293B"/>
  </linearGradient>
  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#F97316"/>
    <stop offset="100%" style="stop-color:#EF4444"/>
  </linearGradient>
  <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#F97316"/>
    <stop offset="100%" style="stop-color:#FBBF24"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 상단 accent bar -->
  <rect x="0" y="0" width="1080" height="8" fill="url(#accent)"/>

  <!-- 섹션 라벨 -->
  <text x="48" y="80" fill="#64748B" font-size="24" font-weight="700" letter-spacing="6">ACTION CHECKLIST</text>

  <!-- 메인 타이틀 -->
  <text x="48" y="148" fill="#FFFFFF" font-size="58" font-weight="800">이번 주 행동 체크리스트</text>

  <!-- 디바이더 -->
  <rect x="48" y="160" width="100" height="5" fill="url(#accent)" rx="2"/>

  
  <text x="48" y="320" fill="url(#hero)" font-size="120" font-weight="900" filter="url(#glow)">3</text>
  <text x="48" y="358" fill="#94A3B8" font-size="22" font-weight="700">실행 항목</text>
  
  <rect x="48.0" y="400" width="317.3333333333333" height="150" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>

  <text x="206.66666666666666" y="530" text-anchor="middle" fill="#94A3B8" font-size="17">전면·부분·결렬</text>
  <rect x="381.3333333333333" y="400" width="317.3333333333333" height="150" fill="#1E293B" rx="14" stroke="#334155" stroke-width="1"/>
  <text x="540.0" y="436" text-anchor="middle" fill="#64748B" font-size="17" font-weight="700" letter-spacing="2">삼성 분할 매수</text>
  <text x="540.0" y="496" text-anchor="middle" fill="#F97316" font-size="48" font-weight="900">②</text>

  <text x="873.3333333333333" y="530" text-anchor="middle" fill="#94A3B8" font-size="17">단기 흔들림 무시</text>
  
  <rect x="48" y="574" width="112" height="42" fill="#F973161A" rx="21" stroke="#F9731655" stroke-width="1"/>

  <rect x="462" y="574" width="160" height="42" fill="#F973161A" rx="21" stroke="#F9731655" stroke-width="1"/>
  <text x="542.0" y="601" text-anchor="middle" fill="#F97316" font-size="18" font-weight="700">PER 펀더멘털</text>
  
  <text x="48" y="652" fill="#64748B" font-size="17" font-weight="700" letter-spacing="2">주요 포인트</text>
  <circle cx="60" cy="683" r="13" fill="#F97316"/>

  <text x="84" y="690" fill="#FFFFFF" font-size="21" font-weight="700">미중 회담 3시나리오 — 포지션 분기 사전 작성</text>

  <text x="84" y="770" fill="#FFFFFF" font-size="21" font-weight="700">30만·200만 목표는 2~3년 — 1~2주 변동성에 흔들리지 않기</text>

  <!-- 인용구 박스 -->
  <rect x="48" y="910" width="984" height="120" fill="#1E3A5F" rx="16" opacity="0.75"/>

  <text x="76" y="954" fill="#F97316" font-size="38" font-weight="900">"</text>
  <text x="104" y="960" fill="#FFFFFF" font-size="32" font-weight="800">변동성 = 매수 기회 프레임</text>
  <text x="76" y="1002" fill="#94A3B8" font-size="20" font-weight="700">— 12시에 만나요</text>

  <!-- 우측 하단 브랜딩 -->
  <text x="1032" y="1058" text-anchor="end" fill="#64748B" font-size="17" font-weight="700" letter-spacing="1">12시에 만나요 · 주식 분석 블로그</text>

</svg></body></html>
