<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 900px; height: 900px; overflow: hidden;
    background: #0D1117;
    font-family: 'NanumGothic', 'Nanum Gothic', 'Apple SD Gothic Neo',
                 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    color: #E6EDF3;
    position: relative;
  }
  .accent-bar {
    position: absolute; left: 0; top: 0;
    width: 8px; height: 100%;
    background: #3FB950;
  }
  .container {
    padding: 44px 52px 36px 72px;
    height: 100%; display: flex; flex-direction: column;
  }
  .header { margin-bottom: 18px; }
  .section-title {
    font-size: 32px; font-weight: 700;
    color: #E6EDF3; line-height: 1.2;
  }
  .divider {
    height: 1px; background: #21262D;
    margin: 16px 0;
  }
  .footer {
    margin-top: auto;
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 14px; border-top: 1px solid #21262D;
    font-size: 13px; color: #8B949E;
  }
  .footer-tag { color: #3FB950; font-weight: 600; }

      .body { flex: 1; margin-top: 4px; }
      .point { display: flex; align-items: center; gap: 18px; margin-bottom: 20px; }
      .badge {
        width: 38px; height: 38px; border-radius: 50%;
        background: #3FB950; color: #0D1117;
        font-size: 17px; font-weight: 800;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .pt-card {
        flex: 1; background: #161B22; border-radius: 10px;
        padding: 13px 20px;
      }
      .pt-text { font-size: 16px; color: #E6EDF3; line-height: 1.5; }
    </style></head><body>
<div class="accent-bar"></div>
<div class="container">
  <div class="header">
    <div class="section-title">✅&nbsp; 오늘의 핵심 포인트</div>
  </div>
  <div class="divider"></div>
  <div class="body">
      <div class="point">
        <div class="badge">1</div>
        <div class="pt-card"><span class="pt-text">빅테크 AI CapEx 7,250억 달러 — 반도체·전력·원전 공급망 동반 수혜 구조 확정</span></div>
      </div>
      <div class="point">
        <div class="badge">2</div>
        <div class="pt-card"><span class="pt-text">코스피 차기 주도 섹터: 전력설비·케이블·변압기(4월 이후 +37%), 원전, AI 쿨링</span></div>
      </div>
      <div class="point">
        <div class="badge">3</div>
        <div class="pt-card"><span class="pt-text">구글 알파벳 AI 수익화 확인 → AI 투자 사이클이 실제 매출로 전환되는 증거</span></div>
      </div>
      <div class="point">
        <div class="badge">4</div>
        <div class="pt-card"><span class="pt-text">코스피 선행 EPS 926p — 지수 7,000~8,000 목표 구간의 실적 근거 제공</span></div>
      </div>
      <div class="point">
        <div class="badge">5</div>
        <div class="pt-card"><span class="pt-text">섹터 로테이션 지도: 반도체 → 전력인프라 → 원전·AI소프트웨어·로봇 순서로 진입</span></div>
      </div></div>
  <div class="footer">
    <span>12시에 만나요 | 주식 분석 블로그</span>
    <span class="footer-tag">✅ 핵심 포인트</span>
  </div>
</div>
</body></html>
